<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Auth | MulikaScans</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
<div class="auth-card">
    <div class="auth-logo">MulikaScans</div>
    <div class="auth-tagline">A product by IklwaLabs</div>

    <h1 class="auth-title">Two-Factor Authentication</h1>
    <p class="auth-sub">Enter the 6-digit code from your authenticator app to continue.</p>

    {% if error %}
    <div class="auth-err">
        <i class="fas fa-exclamation-triangle"></i>
        <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" action="/2fa/verify">
        <div class="auth-field">
            <label>Authentication Code</label>
            <input type="text" name="code" placeholder="000000" maxlength="6"
                   autocomplete="one-time-code" inputmode="numeric" required autofocus>
        </div>
        <button class="auth-btn" type="submit">
            <i class="fas fa-unlock-alt"></i> Verify
        </button>
    </form>

    <div class="auth-link">
        <a href="/logout">Cancel &amp; Sign out</a>
    </div>

    <div class="iklwa-badge">
        © 2026 MulikaScans by <a href="http://iklwalabs.co.tz/" target="_blank" rel="noopener">IklwaLabs</a>
    </div>
</div>
</body>
</html>
