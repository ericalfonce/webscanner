<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeWeb | Scan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web Vulnerability Scanner</h1>
        <p class="subtitle">
            Automated security scanning for authorized web applications
        </p>

        <form method="POST" action="/scan" onsubmit="showLoader()">
            <input type="text" name="url" placeholder="http://example.com" required>
            <button type="submit">Start Scan</button>
        </form>

        <p class="warning">
            ⚠ Use this tool only on systems you own or have explicit permission to test.
        </p>
    </div>
</div>

<!-- Loading Overlay -->
<div id="loader-overlay">
    <div class="loader-box">
        <div class="spinner"></div>
        <p>Scanning for vulnerabilities…</p>
        <span>Focus on your work. Leave cyber threats to us.</span>
    </div>
</div>

<script>
function showLoader() {
    document.getElementById("loader-overlay").style.display = "flex";
}
</script>

</body>
</html>
